<div class="container-fluid page-header py-6 wow fadeIn" data-wow-delay="0.1s">
    <div class="container text-center pt-5 pb-3">
        <h1 class="display-4 text-white animated slideInDown mb-3">Products</h1>
        <nav aria-label="breadcrumb animated slideInDown">
            <ol class="breadcrumb justify-content-center mb-0">
                <li class="breadcrumb-item">
                    <a class="text-white text-decoration-none" routerLink="/">Home</a>
                </li>
                <li class="breadcrumb-item">
                    <a class="text-white text-decoration-none" href="#">Pages</a>
                </li>
                <li class="breadcrumb-item text-primary active" aria-current="page">Products</li>
            </ol>
        </nav>
    </div>
</div>

<section class="products-section py-5">
    <div class="container py-4">

          <!-- NAVBAR CART BUTTON -->
  <div class="text-end mb-3">
    <button class="btn btn-dark position-relative"
            (click)="toggleCart()">
      🛒 Cart
      <span class="badge bg-danger position-absolute top-0 start-100 translate-middle">
        {{ getCartCount() }}
      </span>
    </button>
  </div>

        <div class="section-title text-center mb-5">
            <span class="text-uppercase fw-bold subtitle">// SHOP OUR BAKERY</span>
            <h2 class="display-5 fw-bold mt-2">Freshly Baked For You</h2>
        </div>

        <div class="row g-4">
            <div class="col-12 col-sm-6 col-md-4 col-lg-3" *ngFor="let p of filteredProducts">
                <div class="card product-card h-100 border-0 shadow-sm">

                    <div class="product-img-wrapper overflow-hidden">
                        <img *ngIf="p.photo" 
                             [src]="'https://bakery-management-system-0yj2.onrender.com/uploads/' + p.photo" 
                             class="card-img-top" 
                             [alt]="p.pname">
                        
                        <img *ngIf="!p.photo" 
                             src="assets/img/service-1.jpg" 
                             class="card-img-top" 
                             alt="No Image">
                    </div>

                    <div class="card-body d-flex flex-column p-4">

                        <span class="small text-uppercase category-text">{{ p.category }}</span>

                        <h5 class="card-title fw-bold theme-text-dark mt-1">
                            {{ p.pname }}
                        </h5>

                        <p class="product-desc text-muted small">
                            {{ p.pdesc }}
                        </p>

                        <div class="price-wrap">
                            <span class="fs-5 fw-bold">₹{{ p.price }}</span>
                        </div>

                        <div class="d-flex gap-2 mt-auto">
                            <a class="btn btn-outline-dark btn-sm flex-grow-1 rounded-0">View</a>
                            <a class="btn btn-orange btn-sm flex-grow-1 rounded-0" (click)="addToCart(p)">
                                <i class="fas fa-shopping-cart me-1"></i>Add
                            </a>
                        </div>

                    </div>
                </div>
            </div>

        </div>

        <div *ngIf="filteredProducts.length === 0" class="text-center text-muted mt-5 py-5">
            <h4><i class="fas fa-box-open mb-3 fa-2x"></i></h4>
            <h4>No products available at the moment.</h4>
        </div>

        
    </div>

</section>

<!-- SLIDE-IN CART PANEL -->
<div class="cart-backdrop" *ngIf="showCart" (click)="toggleCart()"></div>
<div class="cart-panel" [class.open]="showCart">

  <div class="cart-header">
    <h5>Your Cart</h5>
    <button class="btn-close" (click)="toggleCart()"></button>
  </div>

  <div *ngIf="cart.length === 0" class="p-3 text-muted">
    Cart is empty
  </div>

  <div *ngFor="let item of cart" class="cart-item">

    <div>
      <strong>{{ item.pname }}</strong>
      <div>₹{{ item.price }}</div>
    </div>

    <div class="qty-controls">
      <button (click)="decreaseQty(item)">-</button>
      <span>{{ item.qty }}</span>
      <button (click)="increaseQty(item)">+</button>
    </div>

  </div>

  <div class="cart-footer" *ngIf="cart.length > 0">
    <h6>Total: ₹{{ getTotal() }}</h6>
    <button class="btn btn-warning w-100 mt-2"
        (click)="goToCheckout()">
  Checkout
</button>

  </div>
