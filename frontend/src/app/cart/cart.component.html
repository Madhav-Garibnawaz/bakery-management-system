<div class="container mt-4">
  <h3 class="text-center mb-4">Your Cart</h3>

  <div *ngIf="cart.length === 0" class="text-center text-muted">
    Cart is empty
  </div>

  <ul class="list-group mb-3" *ngIf="cart.length > 0">
    <li class="list-group-item d-flex justify-content-between align-items-center"
        *ngFor="let item of cart; let i = index">

      {{ item.pname }} - ₹{{ item.price }}

      <button class="btn btn-danger btn-sm"
              (click)="removeItem(i)">
        Remove
      </button>

    </li>
  </ul>

  <h5 *ngIf="cart.length > 0">
    Total: ₹{{ getTotal() }}
  </h5>

  <button *ngIf="cart.length > 0"
          class="btn btn-warning mt-3"
          (click)="clearCart()">
    Clear Cart
  </button>

</div>
<button class="btn btn-warning w-100 mt-2"
        routerLink="/checkout">
  Checkout
</button>
