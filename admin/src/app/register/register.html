<div class="main-wrapper d-flex align-items-center justify-content-center">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-10 col-xl-9">
                <div class="card auth-card shadow-lg border-0 overflow-hidden">
                    <div class="row g-0 flex-row-reverse">
                        <div class="col-md-6 d-none d-md-block position-relative">
                            <div class="bg-image h-100" style="background-image: url('https://images.unsplash.com/photo-1517433670267-08bbd4be890f?q=80&w=1980&auto=format&fit=crop');">
                                <div class="overlay-gradient"></div>
                                <div class="image-text p-5">
                                    <h2 class="display-6 font-serif text-white fw-bold">Admin Access</h2>
                                    <p class="text-white-50">Register to manage the bakery catalog and track inventory.</p>
                                </div>
                            </div>
                        </div>

                        <div class="col-md-6 bg-white d-flex align-items-center">
                            <div class="card-body p-4 p-lg-5">
                                <div class="text-center mb-4">
                                    <h3 class="font-serif fw-bold text-dark-brown">Create Admin Account</h3>
                                    <p class="text-muted small">Fill in the details below</p>
                                </div>

                                <form (submit)="$event.preventDefault(); register()">
                                    <div class="mb-3">
                                        <div class="input-group">
                                            <span class="input-group-text bg-light border-end-0"><i class="fa-regular fa-user text-muted"></i></span>
                                            <input type="text" name="name" [(ngModel)]="name" class="form-control bg-light border-start-0" placeholder="Full Name">
                                        </div>
                                    </div>

                                    <div class="mb-3">
                                        <div class="input-group">
                                            <span class="input-group-text bg-light border-end-0"><i class="fa-regular fa-envelope text-muted"></i></span>
                                            <input type="email" name="email" [(ngModel)]="email" class="form-control bg-light border-start-0" placeholder="Email Address">
                                        </div>
                                    </div>

                                    <div class="mb-3">
                                        <div class="input-group">
                                            <span class="input-group-text bg-light border-end-0"><i class="fa-solid fa-phone text-muted"></i></span>
                                            <input type="tel" name="phone" [(ngModel)]="phone" class="form-control bg-light border-start-0" placeholder="Phone Number">
                                        </div>
                                    </div>

                                    <div class="row g-2 mb-4">
                                        <div class="col-6">
                                            <div class="input-group">
                                                <span class="input-group-text bg-light border-end-0"><i class="fa-solid fa-lock text-muted"></i></span>
                                                <input type="password" name="password" [(ngModel)]="password" class="form-control bg-light border-start-0" placeholder="Password">
                                            </div>
                                        </div>
                                        <div class="col-6">
                                            <div class="input-group">
                                                <span class="input-group-text bg-light border-end-0"><i class="fa-solid fa-lock text-muted"></i></span>
                                                <input type="password" name="confirmPassword" [(ngModel)]="confirmPassword" class="form-control bg-light border-start-0" placeholder="Confirm">
                                            </div>
                                        </div>
                                    </div>

                                    <div class="d-grid mb-3">
                                        <button type="submit" class="btn btn-gold btn-lg text-white shadow-sm">Sign Up</button>
                                    </div>

                                    <div class="text-center">
                                        <p class="text-muted mb-0">Already a member? 
                                            <a routerLink="/login" class="text-dark-brown fw-bold text-decoration-none">Log In</a>
                                        </p>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
