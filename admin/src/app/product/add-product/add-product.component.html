<div class="admin-form-wrapper mx-auto">
  <div class="form-header">
    <h2>Add Product</h2>
    <div class="accent-line"></div>
    <p>Expand your bakery inventory</p>
  </div>

  <div class="form-card">
    <form>
      <div class="mb-3">
        <label class="form-label">Category</label>
        <select class="form-select custom-select" [(ngModel)]="product.category" name="category">
          <option value="">Select Category</option>
          <option *ngFor="let c of categories" [value]="c.categoryName">
            {{ c.categoryName }}
          </option>
        </select>
      </div>

      <div class="mb-3">
        <label class="form-label">Product Name</label>
        <input type="text" class="form-control" [(ngModel)]="product.pname" name="pname" placeholder="Enter product name">
      </div>

      <div class="mb-3">
        <label class="form-label">Description</label>
        <textarea class="form-control" rows="3" [(ngModel)]="product.pdesc" name="pdesc" placeholder="Product description"></textarea>
      </div>

      <div class="row">
        <div class="col-md-6 mb-3">
          <label class="form-label">Price (₹)</label>
          <input type="number" class="form-control" [(ngModel)]="product.price" name="price" placeholder="0.00">
        </div>

        <div class="col-md-6 mb-3">
          <label class="form-label">Quantity</label>
          <input type="number" class="form-control" [(ngModel)]="product.qty" name="qty" placeholder="0">
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label">Manufacture Date</label>
        <input type="date" class="form-control" [(ngModel)]="product.date" name="date">
      </div>

      <div class="mb-4">
        <label class="form-label">Product Image</label>
        <input type="file" class="form-control" (change)="onFile($event)">
      </div>

      <div class="d-grid">
        <button type="button" class="btn btn-bakery" (click)="save()">
          Save Product
        </button>
      </div>
    </form>
  </div>
</div>
