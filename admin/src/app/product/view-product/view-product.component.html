<div class="container mt-4">
  <div class="card shadow">
    <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
      <h4 class="mb-0">📦 Product Inventory</h4>
      
      <input 
        type="text" 
        class="form-control w-25" 
        placeholder="🔍 Search products..." 
        [(ngModel)]="searchText" 
        (input)="search()">
    </div>

    <div class="card-body p-0">
      <table class="table table-bordered table-hover align-middle mb-0">
        <thead class="table-dark text-center">
          <tr>
            <th>#</th> <th>Product Name</th>
            <th>Description</th> <th>Category</th>
            <th>Price / Qty</th>
            <th>Photo</th>
            <th width="180">Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let p of filteredProducts; let i = index">
            
            <td class="text-center fw-bold">{{ i + 1 }}</td>

            <td>
              <span *ngIf="editId !== p._id">{{ p.pname }}</span>
              <input *ngIf="editId === p._id" [(ngModel)]="p.pname" class="form-control form-control-sm">
            </td>

            <td>
              <span *ngIf="editId !== p._id" class="text-muted small">{{ p.pdesc }}</span>
              <textarea *ngIf="editId === p._id" [(ngModel)]="p.pdesc" class="form-control form-control-sm" rows="2"></textarea>
            </td>

            <td>
              <span *ngIf="editId !== p._id">{{ p.category }}</span>
              <input *ngIf="editId === p._id" [(ngModel)]="p.category" class="form-control form-control-sm">
            </td>

            <td>
              <div *ngIf="editId !== p._id">
                ₹{{ p.price }} <br> 
                <span class="badge bg-info">Stock: {{ p.qty }}</span>
              </div>
              <div *ngIf="editId === p._id">
                <input type="number" [(ngModel)]="p.price" class="form-control form-control-sm mb-1" placeholder="Price">
                <input type="number" [(ngModel)]="p.qty" class="form-control form-control-sm" placeholder="Qty">
              </div>
            </td>

            <td class="text-center">
              <img *ngIf="editId !== p._id" [src]="'https://bakery-management-system-0yj2.onrender.com/uploads/' + p.photo" width="100" class="rounded">
              <input *ngIf="editId === p._id" type="file" (change)="onFileChange($event)" class="form-control form-control-sm">
            </td>

            <td class="text-center">
              <button *ngIf="editId !== p._id" class="btn btn-warning btn-sm me-1" (click)="edit(p)">✏️</button>
              <button *ngIf="editId === p._id" class="btn btn-success btn-sm me-1" (click)="update(p)">💾</button>
              <button *ngIf="editId === p._id" class="btn btn-secondary btn-sm me-1" (click)="cancel()">❌</button>
              <button class="btn btn-danger btn-sm" (click)="delete(p._id)">🗑️</button>
            </td>
          </tr>

          <tr *ngIf="filteredProducts.length === 0">
            <td colspan="7" class="text-center text-muted py-4">No products found matching your search.</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
