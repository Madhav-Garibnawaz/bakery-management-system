<div class="container mt-4">
  <div class="card shadow">
    <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
      <h4 class="mb-0">📂 Category List</h4>

      <input
        type="text"
        class="form-control w-25"
        placeholder="🔍 Search..."
        [(ngModel)]="searchText"
        (input)="search()">
    </div>

    <div class="card-body p-0">
      <table class="table table-bordered table-hover align-middle mb-0">
        <thead class="table-dark text-center">
          <tr>
            <th>Category ID</th>
            <th>Name</th>
            <th>Photo</th>
            <th width="220">Actions</th>
          </tr>
        </thead>

        <tbody>
          <tr *ngFor="let c of filteredCategories">
            <td>
              <span *ngIf="editId !== c._id">{{ c.categoryId }}</span>
              <input *ngIf="editId === c._id"
                     class="form-control form-control-sm"
                     [(ngModel)]="c.categoryId">
            </td>

            <td>
              <span *ngIf="editId !== c._id">{{ c.categoryName }}</span>
              <input *ngIf="editId === c._id"
                     class="form-control form-control-sm"
                     [(ngModel)]="c.categoryName">
            </td>

            <td class="text-center">
              <img *ngIf="editId !== c._id"
                [src]="'http://localhost:3000/uploads/' + c.photo"
                class="rounded shadow-sm"
                width="60">

              <input *ngIf="editId === c._id" 
                type="file" 
                class="form-control form-control-sm"
                (change)="onFileChange($event)">
            </td>

            <td class="text-center">
              <button *ngIf="editId !== c._id"
                      class="btn btn-warning btn-sm me-1"
                      (click)="edit(c)">✏ Edit</button>

              <button *ngIf="editId === c._id"
                      class="btn btn-success btn-sm me-1"
                      (click)="update(c)">💾 Save</button>

              <button *ngIf="editId === c._id"
                      class="btn btn-secondary btn-sm me-1"
                      (click)="cancel()">❌ Cancel</button>

              <button class="btn btn-danger btn-sm"
                      (click)="delete(c._id)">🗑 Delete</button>
            </td>
          </tr>

          <tr *ngIf="filteredCategories.length === 0">
            <td colspan="4" class="text-center text-muted py-3">
              No matching category found
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
